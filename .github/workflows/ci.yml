name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate plugin & marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Show CLI version
        run: claude --version

      - name: Validate plugin manifest
        run: claude plugin validate . --strict

      - name: Validate marketplace manifest
        run: claude plugin validate ./.claude-plugin/marketplace.json --strict

  json-lint:
    name: Lint JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JSON files parse
        run: |
          set -e
          find . -path ./.git -prune -o -name '*.json' -print | while read -r f; do
            echo "Checking $f"
            python3 -c "import json,sys; json.load(open('$f'))"
          done

  structural-tests:
    name: Structural tests (frontmatter, refs, versions, eval-contract oracles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Zero-dependency, no network, no Claude calls — see tests/README.md (Tier 0).
      - name: Run structural test suite
        run: node tests/structural.mjs

  eval-gate:
    name: Eval gate (NOT YET ACTIVE — placeholder, see docs/audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: State honestly that behavioral evals are not built yet
        run: |
          echo "Tier-1 trigger-evals and Tier-2 functional fixtures are NOT committed yet."
          echo "This job is a deliberate, honest placeholder (Stage C in the evolution plan)."
          echo "It will become a real seesaw gate once skills/<name>/evals/ + baselines exist."
          echo "Running behavioral evals requires Claude auth — see docs/audit/ci-cd-and-distribution.md."
          # Exits 0: a placeholder must not give a false sense of coverage by failing either.
