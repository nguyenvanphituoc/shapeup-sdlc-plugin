name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate before release
        run: claude plugin validate . --strict

      - name: Check tag matches plugin.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          echo "tag=$tag plugin.json=$ver"
          test "$tag" = "$ver" || { echo "::error::Tag $tag does not match plugin.json version $ver"; exit 1; }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
